name: Generate Snake

on:
  # Se ejecuta automáticamente cada 24 horas (a las 00:00 UTC)
  schedule:
    - cron: "0 0 * * *"
  
  # Te permite ejecutarlo manualmente cuando quieras desde la pestaña Actions
  workflow_dispatch:
  
  # Se ejecuta cada vez que haces un push a la rama main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Genera la animación de la serpiente basada en tus contribuciones
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Sube los archivos generados (.svg) a una rama especial llamada 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
